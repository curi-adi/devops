  #     - ./apps/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
  #     - grafana-data:/var/lib/grafana
  #   depends_on:
  #     - prometheus
  #   networks:
  #     - ecommerce-network
  #   restart: unless-stopped

  # Seed data (one-shot job after API gateway is up)
  seed-job:
    build:
      context: ./apps/seed-job
      dockerfile: Dockerfile
    container_name: seed-job
    environment:
      API_URL: http://api-gateway:80
      PREFLIGHT_ATTEMPTS: 60
      PREFLIGHT_SLEEP: 5
    depends_on:
      api-gateway:
        condition: service_started
      product-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: "no"

  # Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: /api
    volumes:
      - ./frontend:/apps
      - /apps/node_modules
    depends_on:
      api-gateway:
        condition: service_started
      seed-job:
        condition: service_completed_successfully
    networks:
      - ecommerce-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./apps/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product-service
      - user-service
      - cart-service
      - order-service
      - payment-service
      - notification-service
    networks:
      - ecommerce-network
    restart: unless-stopped

networks:
  ecommerce-network:
    driver: bridge

volumes:
  products-data:
  users-data:
  orders-data:
  payments-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
