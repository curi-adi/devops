events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        set $product_service product-service:8001;
        set $user_service user-service:8002;
        set $cart_service cart-service:8003;
        set $order_service order-service:8004;
        set $payment_service payment-service:8005;
        set $notification_service notification-service:8006;

        location /api/products {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            if ($request_method = 'OPTIONS') { return 204; }
            rewrite ^/api/products(.*)$ /api/v1/products$1 break;
            proxy_pass http://$product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            if ($request_method = 'OPTIONS') { return 204; }
            rewrite ^/api/users(.*)$ /api/v1/users$1 break;
            proxy_pass http://$user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/cart {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            if ($request_method = 'OPTIONS') { return 204; }
            rewrite ^/api/cart(.*)$ /api/v1/cart$1 break;
            proxy_pass http://$cart_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/orders {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            if ($request_method = 'OPTIONS') { return 204; }
            rewrite ^/api/orders(.*)$ /api/v1/orders$1 break;
            proxy_pass http://$order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/payments {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            if ($request_method = 'OPTIONS') { return 204; }
            rewrite ^/api/payments(.*)$ /api/v1/payments$1 break;
            proxy_pass http://$payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api/health/product-service {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://$product_service/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location = /api/health/user-service {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://$user_service/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location = /api/health/cart-service {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://$cart_service/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location = /api/health/order-service {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://$order_service/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location = /api/health/payment-service {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://$payment_service/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location = /api/health/notification-service {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://$notification_service/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
