# Production-style reference — env var names differ from apps/services/product-service (see deploy/services.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: your-registry/product-service:1.0.0
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: PRODUCT_DB_HOST
              value: postgres-products
            - name: PRODUCT_DB_NAME
              value: products
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: ecommerce
spec:
  selector:
    app: product-service
  ports:
    - port: 8001
      targetPort: 8001
