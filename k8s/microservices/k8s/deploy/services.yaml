          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
          env:
            - name: PORT
              value: "8006"
            - name: FLASK_ENV
              value: development
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: rabbitmq
            - name: RABBITMQ_PASSWORD
              value: secure_rabbitmq_password
            - name: AWS_ACCESS_KEY_ID
              value: placeholder
            - name: AWS_SECRET_ACCESS_KEY
