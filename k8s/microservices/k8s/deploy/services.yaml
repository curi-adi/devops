# ============================================================
# API Gateway ConfigMap (K8s-adapted nginx config)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: ecommerce
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        resolver kube-dns.kube-system.svc.cluster.local valid=30s;

        server {
            listen 80;
            server_name localhost;

            set $product_service product-service.ecommerce.svc.cluster.local:8001;
            set $user_service user-service.ecommerce.svc.cluster.local:8002;
            set $cart_service cart-service.ecommerce.svc.cluster.local:8003;
            set $order_service order-service.ecommerce.svc.cluster.local:8004;
            set $payment_service payment-service.ecommerce.svc.cluster.local:8005;

            location /api/products {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
                if ($request_method = 'OPTIONS') { return 204; }
                rewrite ^/api/products(.*)$ /api/v1/products$1 break;
                proxy_pass http://$product_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /api/users {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
                if ($request_method = 'OPTIONS') { return 204; }
                rewrite ^/api/users(.*)$ /api/v1/users$1 break;
                proxy_pass http://$user_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /api/cart {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
                if ($request_method = 'OPTIONS') { return 204; }
                rewrite ^/api/cart(.*)$ /api/v1/cart$1 break;
                proxy_pass http://$cart_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }

            location /api/orders {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
                if ($request_method = 'OPTIONS') { return 204; }
                rewrite ^/api/orders(.*)$ /api/v1/orders$1 break;
                proxy_pass http://$order_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }

            location /api/payments {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
                if ($request_method = 'OPTIONS') { return 204; }
                rewrite ^/api/payments(.*)$ /api/v1/payments$1 break;
                proxy_pass http://$payment_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }

            # Health proxy routes for ops dashboard
            location = /api/health/product-service {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
                if ($request_method = 'OPTIONS') { return 204; }
                proxy_pass http://$product_service/health;
                proxy_set_header Host $host;
                proxy_connect_timeout 3s;
                proxy_read_timeout 3s;
            }
            location = /api/health/user-service {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
                if ($request_method = 'OPTIONS') { return 204; }
                proxy_pass http://$user_service/health;
                proxy_set_header Host $host;
                proxy_connect_timeout 3s;
                proxy_read_timeout 3s;
            }
            location = /api/health/cart-service {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
                if ($request_method = 'OPTIONS') { return 204; }
                proxy_pass http://$cart_service/health;
                proxy_set_header Host $host;
                proxy_connect_timeout 3s;
                proxy_read_timeout 3s;
            }
            location = /api/health/order-service {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
                if ($request_method = 'OPTIONS') { return 204; }
                proxy_pass http://$order_service/health;
                proxy_set_header Host $host;
                proxy_connect_timeout 3s;
                proxy_read_timeout 3s;
            }
            location = /api/health/payment-service {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
                if ($request_method = 'OPTIONS') { return 204; }
                proxy_pass http://$payment_service/health;
                proxy_set_header Host $host;
                proxy_connect_timeout 3s;
                proxy_read_timeout 3s;
            }
            location = /api/health/notification-service {
                set $notification_service notification-service.ecommerce.svc.cluster.local:8006;
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
                if ($request_method = 'OPTIONS') { return 204; }
                proxy_pass http://$notification_service/health;
                proxy_set_header Host $host;
                proxy_connect_timeout 3s;
                proxy_read_timeout 3s;
            }

            location /health {
                access_log off;
                return 200 "OK\n";
                add_header Content-Type text/plain;
            }
        }
    }
---
# ============================================================
# Product Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: microservices-product-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: GO_ENV
              value: production
            - name: PRODUCT_DB_HOST
              value: postgres-products
            - name: PRODUCT_DB_PORT
              value: "5432"
            - name: PRODUCT_DB_USER
              value: ecommerce_user
            - name: PRODUCT_DB_PASSWORD
              value: secure_password_123
            - name: PRODUCT_DB_NAME
              value: products
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: ecommerce
spec:
  selector:
    app: product-service
  ports:
    - port: 8001
      targetPort: 8001
---
# ============================================================
# User Service
# ============================================================
apiVersion: apps/v1
