# Horizontal Pod Autoscaler for devops-portal-resources
# Requires metrics-server to be running
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-portal-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-portal-resources
  minReplicas: 1
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 5
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
