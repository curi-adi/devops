# Part 4 (Assignment 4) — with CPU/memory requests and limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portal-resources
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-portal
      variant: resources
  template:
    metadata:
      labels:
        app: devops-portal
        variant: resources
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: devops-portal
        image: YOUR_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/devops-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        env:
        - name: DB_LINK
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: DB_LINK
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: SECRET_KEY
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: ADMIN_PASSWORD
        - name: DEVOPS_CAPTAIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: DEVOPS_CAPTAIN_PASSWORD
        - name: LOG_LEVEL
          value: INFO
---
apiVersion: v1
kind: Service
metadata:
  name: devops-portal-resources
spec:
  type: ClusterIP
  selector:
    app: devops-portal
    variant: resources
  ports:
  - port: 8000
    targetPort: 8000
