# Part 3 — minimal deployment, no resource limits or probes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portal-simple
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-portal
      variant: simple
  template:
    metadata:
      labels:
        app: devops-portal
        variant: simple
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: devops-portal
        image: 768093818017.dkr.ecr.ap-south-1.amazonaws.com/devops-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DB_LINK
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: DB_LINK
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: SECRET_KEY
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: ADMIN_PASSWORD
        - name: DEVOPS_CAPTAIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: DEVOPS_CAPTAIN_PASSWORD
        - name: LOG_LEVEL
          value: INFO
---
apiVersion: v1
kind: Service
metadata:
  name: devops-portal-simple
spec:
  type: NodePort
  selector:
    app: devops-portal
    variant: simple
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30001
