# Part 6 (Assignment 4) — with startup, readiness, and liveness probes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portal-probes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-portal
      variant: probes
  template:
    metadata:
      labels:
        app: devops-portal
        variant: probes
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: devops-portal
        image: YOUR_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/devops-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        env:
        - name: DB_LINK
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: DB_LINK
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: SECRET_KEY
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: ADMIN_PASSWORD
        - name: DEVOPS_CAPTAIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devops-portal-secret
              key: DEVOPS_CAPTAIN_PASSWORD
        - name: LOG_LEVEL
          value: INFO
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 12
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devops-portal-probes
spec:
  type: ClusterIP
  selector:
    app: devops-portal
    variant: probes
  ports:
  - port: 8000
    targetPort: 8000
