name: EKS Infrastructure + K8s Services

on:
  workflow_dispatch:
    inputs:
      infra_path:
        description: "Path to the Terraform infrastructure directory"
        required: true
        type: choice
        options:
          - k8s/EKS/core-cluster
          - k8s/EKS/k8s-services
          - k8s/3-tier-app/infra

      apply_destroy:
        description: "Apply or destroy the infrastructure"
        required: true
        type: choice
        options:
          - apply
          - destroy

      aws_region:
        description: "AWS region"
        required: true
        type: string
        default: "ap-south-1"

      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.12.1"

jobs:
  infra_apply_destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-cluster --region ${{ inputs.aws_region }} || true

      - name: Pre-destroy cleanup (delete Ingresses and wait for ALBs to deprovision)
        if: ${{ inputs.apply_destroy == 'destroy' }}
        run: |
          # Delete Ingresses without waiting — LB controller will start ALB cleanup
          for ns in argocd 3-tier-app-eks monitoring; do
            kubectl delete ingress --all -n $ns --wait=false 2>/dev/null || true
          done
          # Poll until all ALBs are gone (LB controller must finish before terraform destroy)
          echo "Waiting for ALBs to be fully deprovisioned..."
          for i in $(seq 1 36); do
            count=$(aws elbv2 describe-load-balancers --region ${{ inputs.aws_region }} \
              --query "length(LoadBalancers)" --output text 2>/dev/null || echo "0")
            if [ "$count" = "0" ] || [ "$count" = "None" ]; then
              echo "All ALBs deleted. Proceeding with terraform destroy."; break
            fi
            echo "[$i/36] $count ALB(s) still deleting, waiting 10s..."; sleep 10
          done

      - name: Initialize Terraform
        working-directory: ${{ inputs.infra_path }}
        run: terraform init

      - name: Apply or Destroy Terraform
        if: ${{ inputs.apply_destroy == 'destroy' || inputs.infra_path == 'k8s/EKS/core-cluster' }}
        working-directory: ${{ inputs.infra_path }}
        run: terraform ${{ inputs.apply_destroy }} --auto-approve

      - name: Apply Terraform with live pod monitoring
        if: ${{ inputs.apply_destroy == 'apply' && inputs.infra_path != 'k8s/EKS/core-cluster' }}
        working-directory: ${{ inputs.infra_path }}
        run: |
          # Run terraform apply in the background
          terraform apply --auto-approve &
          TF_PID=$!

          echo "Terraform running (PID $TF_PID). Polling pod status every 60s..."
          echo ""

          # Poll pod status every 60s while terraform is running
          while kill -0 $TF_PID 2>/dev/null; do
            echo "========================================================"
            echo "POD STATUS at $(date '+%H:%M:%S')"
            echo "========================================================"
            kubectl get pods --all-namespaces 2>/dev/null || echo "(cluster not ready yet)"
            echo ""
            kubectl get nodes 2>/dev/null || true
            echo ""
            sleep 60
          done

          # Get terraform exit code
          wait $TF_PID
          TF_EXIT=$?

          echo "========================================================"
          echo "FINAL POD STATUS"
          echo "========================================================"
          kubectl get pods --all-namespaces -o wide 2>/dev/null || true
          echo ""
          kubectl get nodes -o wide 2>/dev/null || true

          exit $TF_EXIT
