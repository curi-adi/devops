name: EKS Infrastructure + K8s Services

on:
  workflow_dispatch:
    inputs:
      infra_path:
        description: "Path to the Terraform infrastructure directory"
        required: true
        type: choice
        options:
          - k8s/EKS/core-cluster
          - k8s/EKS/k8s-services
          - k8s/3-tier-app/infra

      apply_destroy:
        description: "Apply or destroy the infrastructure"
        required: true
        type: choice
        options:
          - apply
          - destroy

      aws_region:
        description: "AWS region"
        required: true
        type: string
        default: "ap-south-1"

      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.12.1"

jobs:
  infra_apply_destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-cluster --region ${{ inputs.aws_region }} || true

      - name: Pre-destroy cleanup (delete Ingresses before LB controller is removed)
        if: ${{ inputs.apply_destroy == 'destroy' }}
        run: |
          # Delete all Ingress resources FIRST so the running LB controller cleanly
          # deprovisions the ALBs before the LB controller helm release is destroyed.
          # This avoids the 20-minute ALB drain wait that happens when both are deleted together.
          for ns in argocd 3-tier-app-eks monitoring; do
            kubectl delete ingress --all -n $ns --timeout=300s 2>/dev/null || true
          done
          # Wait briefly for ALBs to deprovision
          sleep 30

      - name: Initialize Terraform
        working-directory: ${{ inputs.infra_path }}
        run: terraform init

      - name: Apply or Destroy Terraform
        working-directory: ${{ inputs.infra_path }}
        run: terraform ${{ inputs.apply_destroy }} --auto-approve
