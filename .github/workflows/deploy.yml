name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd week6/app
          pip install -r requirements.txt
          pip install pytest-flask

      - name: Run pytest
        run: |
          cd week6/app
          pytest tests/test_app.py -v

  # ── Stage 2: Build & Push ────────────────────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd week6/app
          docker build -t $ECR_REGISTRY/aditya-bootcamp-student-portal:$IMAGE_TAG .
          docker push $ECR_REGISTRY/aditya-bootcamp-student-portal:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/aditya-bootcamp-student-portal:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Stage 3: Deploy via Terraform ────────────────────────────────────────────
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: week6/infra
        run: terraform init

      - name: Import ECR repo if it already exists
        working-directory: week6/infra
        run: |
          terraform state list 2>/dev/null | grep -q 'aws_ecr_repository.app_image' \
            && echo "ECR already in state, skipping import" \
            || terraform import aws_ecr_repository.app_image aditya-bootcamp-student-portal

      - name: Terraform Apply
        working-directory: week6/infra
        run: |
          terraform apply -auto-approve \
            -var="image=${{ needs.build-push.outputs.image }}"
